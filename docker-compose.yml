


services:
  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"

  kafka:
    image: wurstmeister/kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper


  producer:
    image: python:3.10-slim
    container_name: producer
    depends_on:
      - kafka
    volumes:
      - ./docker/scripts/producer.py:/app/producer.py
    working_dir: /app
    command: >
      sh -c "pip install kafka-python && python producer.py"

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop2.7.4-java8
    container_name: namenode
    hostname: namenode
    environment:
      - CLUSTER_NAME=hadoop
    ports:
      - "9870:9870"  # (inutile pour Hadoop 2.x, mais conservé)
      - "50070:50070" # UI NameNode Hadoop 2.x
      - "9000:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./docker/hadoop/core-site.xml:/etc/hadoop/conf/core-site.xml   # ✅ Monte config

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop2.7.4-java8
    environment:
      - CLUSTER_NAME=hadoop
      - HDFS_NAMENODE_SERVICE_HOST=namenode
      - HDFS_DATANODE_HOSTNAME=datanode
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    depends_on:
      - namenode
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
      - ./docker/hadoop/core-site.xml:/etc/hadoop/conf/core-site.xml   # ✅ Monte config

  spark-master:
    image: bitnami/spark:3.3.2-debian-11-r0
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"
      - "7077:7077"
    depends_on:
      - namenode
    volumes:
      - ./docker/hadoop/core-site.xml:/opt/bitnami/spark/conf/core-site.xml   # ✅ Monte config
      - ./scripts:/tmp/app   # ✅ Monte le dossier scripts pour spark-submit

  spark-worker:
    image: bitnami/spark:3.3.2-debian-11-r0
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    ports:
      - "8081:8081"
    depends_on:
      - spark-master
    volumes:
      - ./docker/hadoop/core-site.xml:/opt/bitnami/spark/conf/core-site.xml   # ✅ Monte config
      - ./scripts:/tmp/app   # Pour accès éventuel aux scripts

  spark-consumer:
    image: bitnami/spark:3.3.2-debian-11-r0
    depends_on:
      - spark-master
      - kafka
      - namenode
    command: >
      spark-submit --master spark://spark-master:7077 --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.3.2 /tmp/app/consumer_spark.py
    volumes:
      - ./docker/hadoop/core-site.xml:/opt/bitnami/spark/conf/core-site.xml
      - ./scripts:/tmp/app
    environment:
      - SPARK_MODE=client


  hdfs-sync:
    image: bde2020/hadoop-base:2.0.0-hadoop2.7.4-java8
    container_name: hdfs-sync
    depends_on:
      - namenode
    environment:
      - HADOOP_CONF_DIR=/etc/hadoop/conf
    volumes:
      - ./live_json:/live_json
      - ./docker/scripts/sync_hdfs_json.sh:/sync_hdfs_json.sh
      - ./docker/hadoop/core-site.xml:/etc/hadoop/conf/core-site.xml:ro
    entrypoint: ["/sync_hdfs_json.sh"]



  shiny:
    image: rocker/shiny:latest
    container_name: shiny
    ports:
      - "3838:3838"
    volumes:
      - ./app:/srv/shiny-server/app
      - ./live_json:/srv/shiny-server/live_json
      - ./data:/srv/shiny-server/data  # pour SQLite
    depends_on:
      - hdfs-sync



volumes:
  hadoop_namenode:
  hadoop_datanode:
